<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECH | Advanced Meteorological Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">
    <header class="top-bar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="scientist-icon">
                    <img id="user-avatar-display" src="../static/images/scientist.png" alt="Farmer Avatar">
            </div>
            <div>
                <h4 style="margin:0; font-size: 14px;">Dr. Rajan Sharma</h4>
                <p style="font-size:9px; color:var(--accent-turquoise)">CHIEF METEOROLOGIST | RECH</p>
            </div>
        </div>
        <div class="search-node">
            <input type="text" id="state-search" placeholder="Search Node (Maharashtra, Delhi, Sikkim)...">
            <button id="voice-btn" class="voice-btn">🎤</button>
        </div>
        <div id="clock" style="font-size:12px; color:var(--text-dim)">00:00:00</div>
    </header>

    <aside class="sidebar">
        <span class="label-tag">ATMOSPHERIC FLUX</span>
        <div class="hist-legend">
            <div class="legend-dot"><span></span> Live Telemetry Active</div>
        </div>

        <p style="font-size: 10px; color: var(--text-dim); line-height: 1.5; margin-top: 10px;">
            All nodes synchronized. Data stream processed via RECH Satellite-6.
        </p>
        <div class="histogram" id="histogram">
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 70%;"></div>
            <div class="bar" style="height: 35%;"></div>
            <div class="bar" style="height: 85%;"></div>
            <div class="bar" style="height: 55%;"></div>
            <div class="bar" style="height: 65%;"></div>
            <div class="bar" style="height: 50%;"></div>
            <div class="bar" style="height: 75%;"></div>
        </div>


    </aside>

    <main class="map-viewport">
        <iframe
            id="windy-frame"
            src="https://embed.windy.com/embed2.html?lat=22.5&lon=82.0&zoom=5&level=surface&overlay=temp&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1"
            allowfullscreen>
        </iframe>
    </main>

    <footer class="data-panel">
        <button class="nav-btn" onclick="cycleMode(-1)">PREVIOUS</button>

        <div class="main-display">
            <span id="data-label" class="label-tag">Temperature Node</span>
            <div class="main-value">
                <span id="data-value">28</span><span style="font-size:24px; color:var(--text-dim)" id="data-unit">°C</span>
            </div>
            <p id="data-coords" style="font-size:10px; color:var(--text-dim)">Current Location: West Bengal, India</p>
        </div>

        <button class="nav-btn" onclick="cycleMode(1)">NEXT DATASET</button>
    </footer>
</div>

   <script src="script.js"></script>

</body>
</html>
