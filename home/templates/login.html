<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmers/Researcher</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --transition: 0.55s cubic-bezier(0.77, 0, 0.18, 1); }

  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #1a2e1a;
    transition: background var(--transition);
    font-family: 'DM Sans', sans-serif;
    overflow-y: auto; overflow-x: hidden;
    padding: 60px 16px 40px;
  }
  body.sci { background: #0d1b2e; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(107,158,59,0.18) 0%, transparent 70%);
    transition: background var(--transition); pointer-events: none; z-index: 0;
  }
  body.sci::before { background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,212,255,0.12) 0%, transparent 70%); }

  .card {
    position: relative; z-index: 1;
    background: #f5f0e8; border-radius: 36px;
    padding: 44px 32px 36px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
    transition: background var(--transition), box-shadow var(--transition);
  }
  body.sci .card {
    background: #0f2a45;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,212,255,0.12);
  }

  .title {
    font-family: 'Playfair Display', serif; font-size: 12px;
    letter-spacing: 0.22em; text-transform: uppercase; color: #7a6040;
    transition: color var(--transition); position: absolute; top: -30px;
    left: 0; right: 0; text-align: center;
  }
  body.sci .title { color: #7ab8d4; }

  /* AVATAR */
  .avatar-wrap { position: relative; width: 120px; height: 120px; cursor: pointer; }
  .avatar-wrap:hover .avatar { transform: scale(1.04); }
  .avatar-wrap:active .avatar { transform: scale(0.97); }

  .avatar-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 3px solid #6b9e3b; transition: border-color var(--transition);
    animation: pulse-ring 2.5s ease-in-out infinite; pointer-events: none;
  }
  body.sci .avatar-ring { border-color: #00d4ff; }
  @keyframes pulse-ring {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(1.07); }
  }

  .avatar-hint {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.06em; color: #7a6040;
    white-space: nowrap; opacity: 0.7; transition: color var(--transition); pointer-events: none;
  }
  body.sci .avatar-hint { color: #7ab8d4; }

  .avatar {
    width: 120px; height: 120px; border-radius: 50%;
    background: #e8dfc8; overflow: hidden;
    transition: background var(--transition), transform 0.2s; position: relative;
  }
  body.sci .avatar { background: #0a1e30; }

  .avatar-illustration {
    width: 100%; height: 100%; position: absolute; inset: 0;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .avatar-illustration.hidden { opacity: 0; transform: scale(0.85) rotate(-8deg); pointer-events: none; }

  /* HEADLINE */
  .role-headline {
    font-family: 'Playfair Display', serif; font-size: 21px;
    color: #2c1a0a; text-align: center; line-height: 1.25;
    transition: color var(--transition); min-height: 52px;
    display: flex; align-items: center;
  }
  body.sci .role-headline { color: #e0f4ff; }

  /* TOGGLE */
  .role-toggle {
    display: flex; background: rgba(0,0,0,0.08); border-radius: 40px;
    padding: 4px; width: 100%; transition: background var(--transition); user-select: none;
  }
  body.sci .role-toggle { background: rgba(0,212,255,0.08); }
  .toggle-btn {
    flex: 1; padding: 10px 0; border-radius: 32px; border: none; background: transparent;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500;
    cursor: pointer; color: #7a6040; letter-spacing: 0.04em;
    transition: background 0.3s, color 0.3s, box-shadow 0.3s;
  }
  body.sci .toggle-btn { color: #7ab8d4; }
  .toggle-btn.active { background: #6b9e3b; color: #fff; box-shadow: 0 4px 16px rgba(107,158,59,0.35); }
  body.sci .toggle-btn.active { background: #00d4ff; color: #0d1b2e; box-shadow: 0 4px 20px rgba(0,212,255,0.35); }

  /* LOCATION */
  .location-box {
    width: 100%; display: flex; align-items: center; gap: 12px;
    background: rgba(0,0,0,0.06); border-radius: 18px; padding: 13px 16px;
    border: 1.5px solid transparent; transition: background var(--transition), border-color var(--transition);
  }
  body.sci .location-box { background: rgba(0,212,255,0.06); border-color: rgba(0,212,255,0.15); }
  .location-icon {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 12px;
    background: #6b9e3b; display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), box-shadow var(--transition);
    box-shadow: 0 4px 12px rgba(107,158,59,0.3);
  }
  body.sci .location-icon { background: #00d4ff; box-shadow: 0 4px 12px rgba(0,212,255,0.3); }
  .location-icon svg { width: 18px; height: 18px; }
  .location-text { display: flex; flex-direction: column; gap: 2px; }
  .location-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: #7a6040; font-weight: 500; transition: color var(--transition);
  }
  body.sci .location-label { color: #7ab8d4; }
  .location-value { font-size: 14px; font-weight: 500; color: #2c1a0a; transition: color var(--transition); }
  body.sci .location-value { color: #e0f4ff; }

  /* DIVIDER */
  .divider { width: 100%; display: flex; align-items: center; gap: 10px; }
  .divider-line { flex: 1; height: 1px; background: rgba(0,0,0,0.12); transition: background var(--transition); }
  body.sci .divider-line { background: rgba(0,212,255,0.15); }
  .divider-text {
    font-size: 11px; color: #7a6040; letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 500; transition: color var(--transition);
  }
  body.sci .divider-text { color: #7ab8d4; }

  /* EMAIL LOGIN */
  .email-login { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .input-group { position: relative; width: 100%; }
  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; pointer-events: none; color: #7a6040; transition: color var(--transition);
  }
  body.sci .input-icon { color: #7ab8d4; }
  .input-field {
    width: 100%; padding: 13px 16px 13px 42px; border-radius: 14px;
    border: 1.5px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: #2c1a0a;
    outline: none; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }
  .input-field::placeholder { color: #a08060; }
  body.sci .input-field { background: rgba(0,212,255,0.05); border-color: rgba(0,212,255,0.18); color: #e0f4ff; }
  body.sci .input-field::placeholder { color: #4a8aa4; }
  .input-field:focus { border-color: #6b9e3b; background: rgba(255,255,255,0.85); box-shadow: 0 0 0 3px rgba(107,158,59,0.18); }
  body.sci .input-field:focus { border-color: #00d4ff; background: rgba(0,212,255,0.08); box-shadow: 0 0 0 3px rgba(0,212,255,0.18); }

  .eye-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 2px;
    color: #7a6040; transition: color var(--transition);
  }
  body.sci .eye-btn { color: #7ab8d4; }

  .forgot-link {
    text-align: right; font-size: 12px; color: #6b9e3b;
    cursor: pointer; text-decoration: underline; text-underline-offset: 2px;
    transition: color var(--transition); margin-top: -4px;
  }
  body.sci .forgot-link { color: #00d4ff; }

  /* BUTTONS */
  .btn-primary {
    width: 100%; padding: 14px 0; border-radius: 16px; border: none;
    background: #4a7a28; color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer;
    transition: background var(--transition), box-shadow var(--transition), transform 0.15s;
    box-shadow: 0 6px 20px rgba(74,122,40,0.4);
  }
  body.sci .btn-primary { background: #005f7f; box-shadow: 0 6px 20px rgba(0,95,127,0.5); }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .signin-btn {
    width: 100%; padding: 13px 0; border-radius: 16px;
    border: 1.5px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.7);
    color: #2c1a0a; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    font-weight: 500; letter-spacing: 0.02em; display: flex; align-items: center;
    justify-content: center; gap: 10px; cursor: pointer;
    transition: background var(--transition), border-color var(--transition), transform 0.15s;
  }
  body.sci .signin-btn { background: rgba(0,212,255,0.08); border-color: rgba(0,212,255,0.2); color: #e0f4ff; }
  .signin-btn:hover { transform: translateY(-2px); filter: brightness(0.96); }
  .signin-btn:active { transform: translateY(0); }

  .g-icon {
    width: 20px; height: 20px; background: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }

  .signup-link { font-size: 12.5px; color: #7a6040; text-align: center; transition: color var(--transition); }
  body.sci .signup-link { color: #7ab8d4; }
  .signup-link a { color: #4a7a28; font-weight: 600; cursor: pointer; text-decoration: none; }
  body.sci .signup-link a { color: #00d4ff; }

  .modal-overlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(10, 10, 10, 0.6); padding: 24px; z-index: 20;
  }
  .modal-overlay.visible { display: flex; }
  .modal-card {
    width: min(420px, 100%); border-radius: 28px; padding: 28px 24px;
    background: #fff; box-shadow: 0 30px 80px rgba(0,0,0,0.3); text-align: left;
  }
  body.sci .modal-card { background: #0b2237; color: #e0f4ff; }
  .modal-card h2 { margin-bottom: 12px; font-size: 22px; color: #2c1a0a; }
  body.sci .modal-card h2 { color: #e0f4ff; }
  .modal-card p { margin-bottom: 18px; color: #5f5f5f; }
  body.sci .modal-card p { color: #c7e8ff; }
  .modal-actions { display: flex; gap: 12px; margin-top: 16px; }
  .modal-card .btn-primary { margin: 0; }
  .modal-card .signin-btn { width: auto; padding: 12px 18px; border-radius: 16px; }

  /* PARTICLES */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; border-radius: 50%; opacity: 0; animation: float-up 8s ease-in infinite; }
  @keyframes float-up {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; } 90% { opacity: 0.3; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }
</style>
</head>

        <rect x="3" y="11" width="18" height="11" rx="3"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input class="input-field" id="pw-field" type="password" placeholder="Password" autocomplete="current-password"/>
      <button class="eye-btn" id="eye-btn" onclick="togglePw()" type="button">
        <svg id="eye-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <span class="forgot-link" onclick="openForgotModal()">Forgot password?</span>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <!-- OR DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>

  <!-- GOOGLE -->
  <button type="button" class="signin-btn" onclick="handleGoogleLogin()" style="width: 100%; border: none; background: none; padding: 0; cursor: pointer;">
    <div class="g-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </div>
    Sign in with Google
  </button>

  <p class="signup-link">Don't have an account? <a onclick="alert('Sign up coming soon!')">Sign up</a></p>
</div>

<div class="modal-overlay" id="forgot-modal" aria-hidden="true">
  <div class="modal-card">
    <h2>Forgot Password</h2>
    <p>Enter the email you use for login and we will send a reset link to your inbox.</p>
    <div class="input-group">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
      <input class="input-field" id="forgot-email-field" type="email" placeholder="Email address" autocomplete="email" />
    </div>
    <div class="modal-actions">
      <button class="btn-primary" id="forgot-send-btn" type="button" onclick="sendForgotPassword()">Send reset email</button>
      <button class="signin-btn" type="button" onclick="closeForgotModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let currentRole = 'farmer';
  let pwVisible   = false;

  const FARMER_LOCATIONS = ['Sikkim, India', 'Punjab, India', 'Haryana, India', 'UP, India'];
  const SCI_LOCATIONS    = ['ICAR Lab, Delhi', 'IARI Research Center', 'AgriTech Hub, Pune', 'NIT Campus, Silchar'];

  function spawnParticles() {
    const c = document.getElementById('particles');
    c.innerHTML = '';
    const isSci = currentRole === 'scientist';
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const sz = Math.random()*6+3;
      p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
        background:${isSci?`rgba(0,212,255,${Math.random()*0.5+0.2})`:`rgba(107,158,59,${Math.random()*0.5+0.2})`};
        animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*5}s;`;
      c.appendChild(p);
    }
  }

  function setRole(role) {
    if (currentRole === role) return;
    currentRole = role;
    const isSci = role === 'scientist';
    document.body.classList.toggle('sci', isSci);
    document.getElementById('farmer-avatar').classList.toggle('hidden', isSci);
    document.getElementById('sci-avatar').classList.toggle('hidden', !isSci);
    document.getElementById('btn-farmer').classList.toggle('active', !isSci);
    document.getElementById('btn-sci').classList.toggle('active', isSci);
    document.getElementById('role-headline').innerHTML = isSci ? 'Welcome,<br>Scientist' : 'Welcome,<br>Farmer';
    const locs = isSci ? SCI_LOCATIONS : FARMER_LOCATIONS;
    document.getElementById('location-value').textContent = locs[Math.floor(Math.random()*locs.length)];
    spawnParticles();
  }

  function toggleRole() { setRole(currentRole === 'farmer' ? 'scientist' : 'farmer'); }

  function togglePw() {
    pwVisible = !pwVisible;
    document.getElementById('pw-field').type = pwVisible ? 'text' : 'password';
    document.getElementById('eye-icon').innerHTML = pwVisible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  function openForgotModal() {
    document.getElementById('forgot-modal').classList.add('visible');
    document.getElementById('forgot-email-field').focus();
  }

  function closeForgotModal() {
    document.getElementById('forgot-modal').classList.remove('visible');
  }

  function sendForgotPassword() {
    const email = document.getElementById('forgot-email-field').value.trim();
    if (!email) { alert('Please enter your email address.'); return; }

    const button = document.getElementById('forgot-send-btn');
    button.disabled = true;

    fetch('/auth/forgot-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email }),
    })
      .then(response => response.json())
      .then(data => {
        alert(data.message || 'If this email is registered, an email has been sent.');
        closeForgotModal();
      })
      .catch(() => {
        alert('There was an error sending the reset link. Please try again later.');
      })
      .finally(() => {
        button.disabled = false;
      });
  }

  function handleLogin() {
    const email = document.getElementById('email-field').value.trim();
    const pw    = document.getElementById('pw-field').value;
    const btn   = document.getElementById('login-btn');
    if (!email || !pw) { alert('Please enter your email and password.'); return; }

    btn.textContent = 'Signing in…';
    btn.disabled = true;

    fetch('{{ url_for("auth.login") }}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        email,
        password: pw,
        user_type: currentRole,
      }),
    })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          alert(data.error || 'Login failed.');
          btn.textContent = 'Sign In';
          btn.disabled = false;
        }
      })
      .catch(() => {
        alert('Unable to sign in right now. Please try again later.');
        btn.textContent = 'Sign In';
        btn.disabled = false;
      });
  }

  function handleGoogleLogin() {
    // First set the user type in the session
    fetch(`/auth/set-user-type/${currentRole}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      }
    })
    .then(response => {
      if (response.ok) {
        // Then redirect to Google OAuth
        window.location.href = '{{ url_for("auth.google_login") }}';
      } else {
        alert('Error setting user type. Please try again.');
      }
    })
    .catch(error => {
      console.error('Error:', error);
      alert('Error setting user type. Please try again.');
    });
  }

  spawnParticles();
</script>
</body>
</html>
