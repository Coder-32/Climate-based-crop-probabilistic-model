<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Researcher Portal - Agricultural Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0d1b2e 0%, #1a2a3a 50%, #0f2233 100%);
      color: #e0f4ff;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 1100px);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 34, 51, 0.7);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 22px;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #7ab8d4;
      font-weight: 500;
      position: relative;
      transition: 0.3s;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #00d4ff;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .profile-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #0d1b2e;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 212, 255, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: 0.3s ease;
      position: relative;
    }

    .profile-menu {
      position: relative;
    }

    .profile-dropdown {
      position: absolute;
      top: 52px;
      right: 0;
      min-width: 160px;
      background: rgba(15, 34, 51, 0.98);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      display: none;
      flex-direction: column;
      padding: 8px 0;
      z-index: 1001;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .profile-menu:hover .profile-dropdown,
    .profile-menu:focus-within .profile-dropdown {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .profile-dropdown a {
      display: block;
      padding: 12px 18px;
      text-decoration: none;
      color: #7ab8d4;
      font-weight: 600;
      transition: background 0.2s ease, color 0.2s ease;
      white-space: nowrap;
    }

    .profile-dropdown a.logout {
      color: #ff6b6b;
    }

    .profile-dropdown a:hover {
      background: rgba(0, 212, 255, 0.12);
    }

    .hero-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 60px;
      text-align: center;
    }

    .hero-content {
      max-width: 800px;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero-badge {
      display: inline-block;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #00d4ff;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero-title {
      font-size: 3.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #7ab8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: #7ab8d4;
      margin-bottom: 40px;
      line-height: 1.6;
      font-weight: 400;
      opacity: 0.9;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 30px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      font-size: 15px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #0d1b2e;
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0, 212, 255, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 1.5px solid rgba(0, 212, 255, 0.5);
      color: #7ab8d4;
    }

    .btn-secondary:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: #00d4ff;
      color: #00d4ff;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 60px;
      padding: 0 20px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature-card {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      padding: 24px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.4);
      transform: translateY(-5px);
    }

    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 8px;
    }

    .feature-desc {
      font-size: 0.95rem;
      color: #7ab8d4;
      line-height: 1.5;
    }

    .profile-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(0, 212, 255, 0.45);
    }

    .logout-link {
      color: #ff6b6b;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🔬 AgriLab</div>
    <div class="nav-links">
      <a href="{{ url_for('home.home') }}">Home</a>
      <div class="profile-menu">
        <button class="profile-btn" title="Profile">
          {% if user %}
            {{ user.name[0].upper() }}
          {% else %}
            U
          {% endif %}
        </button>
        <div class="profile-dropdown">
          {% if user %}
            <a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('auth.logout') }}" class="logout">Logout</a>
          {% else %}
            <a href="{{ url_for('home.login') }}">Login</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <section class="hero-section">
    <div class="hero-content">
      <div class="hero-badge">Welcome Researcher</div>
      
      <h1 class="hero-title">
        Researcher Dashboard
      </h1>

      <p class="hero-subtitle">
        Choose your next step: open the dashboard or launch research tools.
      </p>

      <div class="cta-buttons">
        <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-primary">Dashboard →</a>
        <a href="{{ url_for('navigation.navigation') }}" class="btn btn-secondary">Research Tools →</a>
      </div>
    </div>
  </section>
</body>
</html>
